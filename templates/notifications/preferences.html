{% extends 'base.html' %}
{% load static %}

{% block title %}Notification Preferences - AI Career Assistant{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4"><i class="fas fa-cog"></i> Notification Preferences</h1>
            
            <div class="card">
                <div class="card-body">
                    <form method="POST">
                        {% csrf_token %}
                        
                        <h5 class="mb-3">Email Notifications</h5>
                        
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="email_job" 
                                name="email_on_job_match" {% if preferences.email_on_job_match %}checked{% endif %}>
                            <label class="form-check-label" for="email_job">
                                Email me when new jobs match my profile
                            </label>
                        </div>
                        
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="email_app" 
                                name="email_on_application_update" {% if preferences.email_on_application_update %}checked{% endif %}>
                            <label class="form-check-label" for="email_app">
                                Email me when applications are updated
                            </label>
                        </div>
                        
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="checkbox" id="email_forum" 
                                name="email_on_forum_reply" {% if preferences.email_on_forum_reply %}checked{% endif %}>
                            <label class="form-check-label" for="email_forum">
                                Email me when someone replies to my forum posts
                            </label>
                        </div>
                        
                        <hr>
                        
                        <h5 class="mb-3">In-App Notifications</h5>
                        
                        <div class="form-check mb-3">
                            <input class="form-check-input" type="checkbox" id="in_app" 
                                name="in_app_notifications" {% if preferences.in_app_notifications %}checked{% endif %}>
                            <label class="form-check-label" for="in_app">
                                Show in-app notifications
                            </label>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label">Notification Frequency</label>
                            <select name="notification_frequency" class="form-select">
                                <option value="instant" {% if preferences.notification_frequency == 'instant' %}selected{% endif %}>
                                    Instant - Notify immediately
                                </option>
                                <option value="daily" {% if preferences.notification_frequency == 'daily' %}selected{% endif %}>
                                    Daily - Send daily digest
                                </option>
                                <option value="weekly" {% if preferences.notification_frequency == 'weekly' %}selected{% endif %}>
                                    Weekly - Send weekly digest
                                </option>
                            </select>
                        </div>
                        
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save"></i> Save Preferences
                        </button>
                        <a href="{% url 'notifications' %}" class="btn btn-outline-secondary">
                            Back to Notifications
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
